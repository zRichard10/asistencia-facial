<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Control de asistencia con reconocimiento facial">
  <title>Control de Asistencia</title>
  <link rel="manifest" href="manifest.json">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --bg: #0a0e17;
      --bg2: #111827;
      --bg3: rgba(17, 24, 39, .7);
      --glass: rgba(255, 255, 255, .04);
      --hover: rgba(255, 255, 255, .06);
      --text: #f1f5f9;
      --text2: #94a3b8;
      --muted: #64748b;
      --accent: #6366f1;
      --accent2: #818cf8;
      --glow: rgba(99, 102, 241, .25);
      --green: #22c55e;
      --red: #ef4444;
      --amber: #f59e0b;
      --border: rgba(255, 255, 255, .08);
      --border2: rgba(255, 255, 255, .15);
      --radius: 14px;
      --font: 'Inter', system-ui, sans-serif
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    html {
      font-size: 15px
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(ellipse at 20% 20%, rgba(99, 102, 241, .07)0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(6, 182, 212, .05)0%, transparent 50%)
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: rgba(10, 14, 23, .9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 10;
      flex-shrink: 0
    }

    .header__icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      background: linear-gradient(135deg, var(--accent), #06b6d4);
      box-shadow: 0 0 20px var(--glow)
    }

    .header__title {
      font-size: 1.05rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--text), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text
    }

    .header__sub {
      font-size: .65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px
    }

    .header__badge {
      margin-left: auto;
      padding: 4px 10px;
      border-radius: 50px;
      font-size: .7rem;
      font-weight: 600;
      background: var(--glass);
      border: 1px solid var(--border);
      color: var(--text2)
    }

    .header__badge.ready {
      background: rgba(34, 197, 94, .15);
      border-color: rgba(34, 197, 94, .3);
      color: var(--green)
    }

    .views {
      flex: 1;
      overflow: hidden;
      position: relative;
      z-index: 1
    }

    .view {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 16px;
      gap: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease, transform .25s ease;
      transform: translateY(8px)
    }

    .view.active {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0)
    }

    .nav {
      display: flex;
      background: rgba(10, 14, 23, .92);
      backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      position: relative;
      z-index: 10;
      padding-bottom: env(safe-area-inset-bottom)
    }

    .nav__btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 10px 4px 8px;
      border: none;
      background: none;
      color: var(--muted);
      font-family: var(--font);
      font-size: .62rem;
      font-weight: 500;
      cursor: pointer;
      transition: color .2s
    }

    .nav__btn.active {
      color: var(--accent2)
    }

    .nav__btn.active .nav__icon {
      transform: scale(1.15)
    }

    .nav__icon {
      font-size: 1.25rem;
      transition: transform .2s
    }

    .card {
      background: var(--bg3);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden
    }

    .card__head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border)
    }

    .card__title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .88rem;
      font-weight: 600
    }

    .camera-wrap {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      background: #000;
      aspect-ratio: 4/3;
      border: 1px solid var(--border)
    }

    .camera-wrap video,
    .camera-wrap canvas,
    .camera-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block
    }

    .camera-wrap canvas {
      position: absolute;
      top: 0;
      left: 0
    }

    .camera-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--muted);
      background: var(--bg2);
      font-size: .82rem;
      cursor: pointer
    }

    .camera-placeholder span:first-child {
      font-size: 2.5rem;
      opacity: .4
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 20px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--glass);
      color: var(--text);
      font-family: var(--font);
      font-size: .84rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
      user-select: none;
      -webkit-tap-highlight-color: transparent
    }

    .btn:active {
      transform: scale(.97)
    }

    .btn--primary {
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      border-color: transparent;
      box-shadow: 0 2px 16px var(--glow)
    }

    .btn--success {
      background: linear-gradient(135deg, var(--green), #16a34a);
      border-color: transparent
    }

    .btn--danger {
      background: linear-gradient(135deg, var(--red), #dc2626);
      border-color: transparent
    }

    .btn--big {
      width: 100%;
      padding: 16px;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 16px
    }

    .btn:disabled {
      opacity: .35;
      pointer-events: none
    }

    .btn--icon {
      width: 40px;
      height: 40px;
      padding: 0;
      border-radius: 50%
    }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px
    }

    .form-label {
      font-size: .75rem;
      font-weight: 500;
      color: var(--text2)
    }

    .form-input {
      padding: 11px 14px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font);
      font-size: .85rem;
      outline: none;
      transition: border-color .2s
    }

    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow)
    }

    .student-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 12px
    }

    .student-item__photo {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border)
    }

    .student-item__avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: .85rem;
      background: linear-gradient(135deg, var(--accent), #06b6d4);
      flex-shrink: 0;
      color: #fff
    }

    .student-item__info {
      flex: 1;
      min-width: 0
    }

    .student-item__name {
      font-size: .85rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .student-item__code {
      font-size: .7rem;
      color: var(--muted)
    }

    .result-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      animation: slideIn .3s ease
    }

    .result-item--present {
      background: rgba(34, 197, 94, .1);
      border: 1px solid rgba(34, 197, 94, .2)
    }

    .result-item--absent {
      background: rgba(239, 68, 68, .08);
      border: 1px solid rgba(239, 68, 68, .15)
    }

    .result-item__badge {
      padding: 3px 10px;
      border-radius: 50px;
      font-size: .72rem;
      font-weight: 600
    }

    .result-item--present .result-item__badge {
      background: rgba(34, 197, 94, .15);
      color: var(--green)
    }

    .result-item--absent .result-item__badge {
      background: rgba(239, 68, 68, .1);
      color: var(--red)
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(16px)
      }

      to {
        opacity: 1;
        transform: translateX(0)
      }
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px
    }

    .stat {
      text-align: center;
      padding: 12px 4px;
      border-radius: 12px;
      background: var(--glass);
      border: 1px solid var(--border)
    }

    .stat__val {
      font-size: 1.5rem;
      font-weight: 800;
      line-height: 1.2
    }

    .stat__val--g {
      color: var(--green)
    }

    .stat__val--r {
      color: var(--red)
    }

    .stat__val--a {
      color: var(--accent2)
    }

    .stat__lbl {
      font-size: .62rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .4px;
      margin-top: 2px
    }

    .progress {
      height: 6px;
      background: rgba(255, 255, 255, .06);
      border-radius: 50px;
      overflow: hidden
    }

    .progress__fill {
      height: 100%;
      border-radius: 50px;
      transition: width .5s ease;
      background: linear-gradient(90deg, var(--accent), var(--green))
    }

    .session-card {
      padding: 14px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center
    }

    .session-card__info {
      display: flex;
      flex-direction: column;
      gap: 2px
    }

    .session-card__date {
      font-size: .85rem;
      font-weight: 600
    }

    .session-card__meta {
      font-size: .7rem;
      color: var(--muted)
    }

    .session-card__count {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--green)
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 14, 23, .95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 999;
      transition: opacity .4s
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .loading-text {
      font-size: .88rem;
      color: var(--text2);
      text-align: center
    }

    .toast-box {
      position: fixed;
      bottom: 80px;
      left: 16px;
      right: 16px;
      z-index: 500;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none
    }

    .toast {
      padding: 12px 16px;
      border-radius: 12px;
      background: var(--bg2);
      border: 1px solid var(--border);
      box-shadow: 0 8px 32px rgba(0, 0, 0, .5);
      font-size: .82rem;
      display: flex;
      align-items: center;
      gap: 8px;
      pointer-events: auto;
      animation: toastIn .3s ease
    }

    .toast--ok {
      border-left: 3px solid var(--green)
    }

    .toast--err {
      border-left: 3px solid var(--red)
    }

    .toast--info {
      border-left: 3px solid var(--accent)
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .empty {
      padding: 32px 16px;
      text-align: center;
      color: var(--muted);
      font-size: .82rem
    }

    .empty__icon {
      font-size: 2.2rem;
      margin-bottom: 8px;
      opacity: .4
    }

    ::-webkit-scrollbar {
      width: 4px
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 50px
    }

    /* ── Camera Controls ── */
    .cam-controls{position:absolute;bottom:12px;right:12px;display:flex;gap:8px;z-index:5}
    .cam-btn{width:42px;height:42px;border-radius:50%;border:none;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;-webkit-tap-highlight-color:transparent}
    .cam-btn:active{transform:scale(.9);background:rgba(99,102,241,.6)}
    .cam-flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:6;border-radius:var(--radius);transition:opacity .1s}
    .cam-flash.fire{opacity:.8;transition:none}
    .camera-wrap--big{aspect-ratio:auto;min-height:50vh;max-height:70vh;flex-shrink:0}
    .camera-wrap--reg{aspect-ratio:3/4;max-width:280px;margin:0 auto}
    @media (orientation:landscape){.camera-wrap--big{min-height:40vh;max-height:80vh;aspect-ratio:16/9}}
    @media (min-width:768px){.camera-wrap--big{max-height:75vh}}
  </style>
</head>

<body>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loader">
    <div class="spinner" id="loaderSpinner"></div>
    <div class="loading-text" id="loaderText">Cargando modelos de IA...</div>
    <button class="btn btn--primary" id="btnRetry" style="display:none;margin-top:8px" onclick="loadModels()">🔄 Reintentar</button>
    <div style="font-size:.7rem;color:var(--muted);max-width:280px;text-align:center;margin-top:4px" id="loaderHint"></div>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="header__icon">🎓</div>
    <div>
      <div class="header__title">Asistencia Facial</div>
      <div class="header__sub">Reconocimiento en tiempo real</div>
    </div>
    <div class="header__badge" id="statusBadge">Cargando...</div>
  </header>

  <!-- Views -->
  <main class="views">

    <!-- ═══ TAB 1: Tomar Asistencia ═══ -->
    <section class="view active" id="viewAttendance">
      <div class="camera-wrap camera-wrap--big">
        <video id="camVideo" autoplay muted playsinline></video>
        <canvas id="camCanvas"></canvas>
        <div class="cam-flash" id="camFlash"></div>
        <div class="camera-placeholder" id="camPlaceholder">
          <span>📷</span><span>Toque para activar la camara</span>
        </div>
        <div class="cam-controls" id="camControls" style="display:none">
          <button class="cam-btn" id="btnCamFlip" title="Cambiar camara">🔄</button>
        </div>
      </div>
      <button class="btn btn--primary btn--big" id="btnTakeAttendance" disabled>
        📸 Tomar Asistencia
      </button>
      <!-- Results -->
      <div id="resultsSection" style="display:none">
        <div class="card">
          <div class="card__head">
            <div class="card__title">📊 Resultado</div>
            <span id="resultCount" style="font-size:.78rem;color:var(--text2)"></span>
          </div>
          <div class="stats" style="padding:12px">
            <div class="stat">
              <div class="stat__val stat__val--g" id="rPresent">0</div>
              <div class="stat__lbl">Presentes</div>
            </div>
            <div class="stat">
              <div class="stat__val stat__val--r" id="rAbsent">0</div>
              <div class="stat__lbl">Ausentes</div>
            </div>
            <div class="stat">
              <div class="stat__val stat__val--a" id="rTotal">0</div>
              <div class="stat__lbl">Total</div>
            </div>
          </div>
          <div class="progress" style="margin:0 12px 12px">
            <div class="progress__fill" id="rProgress" style="width:0%"></div>
          </div>
        </div>
        <div id="resultsList" style="display:flex;flex-direction:column;gap:6px"></div>
        <div class="btn-row">
          <button class="btn btn--success" id="btnSaveSession" style="flex:1">💾 Guardar</button>
          <button class="btn" id="btnExportResult" style="flex:1">📥 Excel</button>
        </div>
      </div>
    </section>

    <!-- ═══ TAB 2: Registrar Estudiantes ═══ -->
    <section class="view" id="viewStudents">
      <div class="card">
        <div class="card__head">
          <div class="card__title">➕ Registrar Estudiante</div>
        </div>
        <div style="padding:14px;display:flex;flex-direction:column;gap:12px">
          <div class="camera-wrap camera-wrap--reg">
            <video id="regVideo" autoplay muted playsinline></video>
            <img id="regPreview" style="display:none" alt="preview">
            <div class="cam-flash" id="regFlash"></div>
            <div class="camera-placeholder" id="regPlaceholder"><span>👤</span><span>Camara</span></div>
            <div class="cam-controls">
              <button class="cam-btn" id="btnRegFlip" title="Cambiar camara">🔄</button>
            </div>
          </div>
          <div class="btn-row" style="justify-content:center">
            <button class="btn btn--primary" id="btnRegCapture">📸 Capturar</button>
            <button class="btn" id="btnRegRetake" style="display:none">🔄 Retomar</button>
          </div>
          <div class="form-group">
            <label class="form-label">Nombre Completo</label>
            <input class="form-input" id="regName" placeholder="Ej: Juan Carlos Perez">
          </div>
          <div class="form-group">
            <label class="form-label">Codigo / ID</label>
            <input class="form-input" id="regCode" placeholder="Ej: EST-001">
          </div>
          <button class="btn btn--success btn--big" id="btnRegSave" disabled>✅ Registrar Estudiante</button>
        </div>
      </div>
      <div class="card">
        <div class="card__head">
          <div class="card__title">👥 Estudiantes (<span id="studentCountLabel">0</span>)</div>
        </div>
        <div id="studentList" style="padding:10px;display:flex;flex-direction:column;gap:6px">
          <div class="empty">
            <div class="empty__icon">👤</div>No hay estudiantes registrados
          </div>
        </div>
      </div>
    </section>

    <!-- ═══ TAB 3: Historial ═══ -->
    <section class="view" id="viewHistory">
      <div class="card">
        <div class="card__head">
          <div class="card__title">📋 Historial de Sesiones</div>
          <button class="btn" id="btnExportAll" style="padding:6px 12px;font-size:.72rem">📥 Excel</button>
        </div>
        <div id="historyList" style="padding:10px;display:flex;flex-direction:column;gap:8px">
          <div class="empty">
            <div class="empty__icon">📋</div>No hay sesiones guardadas
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Bottom Nav -->
  <nav class="nav">
    <button class="nav__btn active" data-tab="viewAttendance">
      <span class="nav__icon">📸</span>Asistencia
    </button>
    <button class="nav__btn" data-tab="viewStudents">
      <span class="nav__icon">👥</span>Estudiantes
    </button>
    <button class="nav__btn" data-tab="viewHistory">
      <span class="nav__icon">📋</span>Historial
    </button>
  </nav>

  <!-- Toast -->
  <div class="toast-box" id="toastBox"></div>

  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1/dist/face-api.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script>
    const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1/model';
    const MATCH_THRESHOLD = 0.6, DB_NAME = 'AsistenciaDB', DB_VER = 1;
    let db = null, modelsLoaded = false, camStream = null, regStream = null, regPhotoData = null, lastResults = null;
    let camFacing = 'environment', regFacing = 'user';

    async function loadModels() {
      document.getElementById('btnRetry').style.display = 'none';
      document.getElementById('loaderSpinner').style.display = 'block';
      document.getElementById('loaderHint').textContent = '';
      document.getElementById('loader').classList.remove('hidden');
      const maxRetries = 3;
      for (let attempt = 1; attempt <= maxRetries; attempt++) {
        try {
          updateLoader(attempt > 1 ? `Reintentando... (intento ${attempt}/${maxRetries})` : 'Descargando modelos de IA...');
          await Promise.all([
            faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
            faceapi.nets.faceLandmark68TinyNet.loadFromUri(MODEL_URL),
            faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
          ]);
          modelsLoaded = true;
          document.getElementById('statusBadge').textContent = 'Listo';
          document.getElementById('statusBadge').classList.add('ready');
          hideLoader();
          toast('Modelos cargados correctamente', 'ok');
          return; // success
        } catch (e) {
          console.error(`Intento ${attempt} fallo:`, e);
          if (attempt < maxRetries) {
            updateLoader(`Fallo intento ${attempt}. Reintentando en 2s...`);
            await new Promise(r => setTimeout(r, 2000));
          }
        }
      }
      // All retries failed
      document.getElementById('loaderSpinner').style.display = 'none';
      updateLoader('No se pudieron cargar los modelos de IA');
      document.getElementById('loaderHint').textContent = 'Verifique su conexion a internet y toque Reintentar. Los modelos pesan ~7MB y se descargan solo la primera vez.';
      document.getElementById('btnRetry').style.display = 'inline-flex';
    }

    document.addEventListener('DOMContentLoaded', async () => {
      if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => { });
      db = await openDB();
      await loadModels();
      document.querySelectorAll('.nav__btn').forEach(b => { b.onclick = () => switchTab(b.dataset.tab) });
      document.getElementById('camPlaceholder').onclick = startMainCamera;
      document.getElementById('btnTakeAttendance').onclick = takeAttendance;
      document.getElementById('btnSaveSession').onclick = saveCurrentSession;
      document.getElementById('btnExportResult').onclick = () => exportResults(lastResults);
      document.getElementById('btnRegCapture').onclick = captureRegPhoto;
      document.getElementById('btnRegRetake').onclick = retakeRegPhoto;
      document.getElementById('btnRegSave').onclick = registerStudent;
      document.getElementById('btnExportAll').onclick = exportAllSessions;
      document.getElementById('btnCamFlip').onclick = () => { camFacing = camFacing === 'environment' ? 'user' : 'environment'; startMainCamera(); };
      document.getElementById('btnRegFlip').onclick = () => { regFacing = regFacing === 'user' ? 'environment' : 'user'; startRegCamera(); };
      refreshStudentList(); refreshHistory();
    });

    function openDB() { return new Promise((res, rej) => { const r = indexedDB.open(DB_NAME, DB_VER); r.onupgradeneeded = e => { const d = e.target.result; if (!d.objectStoreNames.contains('students')) d.createObjectStore('students', { keyPath: 'id', autoIncrement: true }); if (!d.objectStoreNames.contains('sessions')) d.createObjectStore('sessions', { keyPath: 'id', autoIncrement: true }) }; r.onsuccess = e => res(e.target.result); r.onerror = e => rej(e.target.error) }) }
    function dbTx(s, m = 'readonly') { return db.transaction(s, m).objectStore(s) }
    function dbGetAll(s) { return new Promise((res, rej) => { const r = dbTx(s).getAll(); r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error) }) }
    function dbAdd(s, d) { return new Promise((res, rej) => { const r = dbTx(s, 'readwrite').add(d); r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error) }) }
    function dbDelete(s, id) { return new Promise((res, rej) => { const r = dbTx(s, 'readwrite').delete(id); r.onsuccess = () => res(); r.onerror = () => rej(r.error) }) }

    function switchTab(v) { document.querySelectorAll('.view').forEach(x => x.classList.remove('active')); document.querySelectorAll('.nav__btn').forEach(x => x.classList.remove('active')); document.getElementById(v).classList.add('active'); document.querySelector(`[data-tab="${v}"]`).classList.add('active'); if (v === 'viewStudents') startRegCamera(); else stopRegCamera(); if (v === 'viewHistory') refreshHistory() }

    async function startMainCamera() {
      if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
      try {
        // Try exact facingMode first, fallback to ideal
        let stream;
        try {
          stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: camFacing }, width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false });
        } catch {
          stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: camFacing, width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false });
        }
        camStream = stream;
        const v = document.getElementById('camVideo');
        v.srcObject = camStream; await v.play();
        // Mirror front camera preview
        v.style.transform = camFacing === 'user' ? 'scaleX(-1)' : 'none';
        document.getElementById('camPlaceholder').style.display = 'none';
        document.getElementById('camControls').style.display = 'flex';
        document.getElementById('btnTakeAttendance').disabled = false;
        toast(camFacing === 'user' ? 'Camara frontal' : 'Camara trasera', 'ok');
      } catch (e) { toast('No se pudo acceder a la camara: ' + e.message, 'err'); }
    }

    async function takeAttendance() {
      if (!modelsLoaded) return toast('Modelos no cargados', 'err');
      const students = await dbGetAll('students');
      if (!students.length) return toast('Registre estudiantes primero', 'err');
      const btn = document.getElementById('btnTakeAttendance');
      btn.disabled = true; btn.textContent = 'Analizando rostros...';
      try {
        // Flash effect
        const fl = document.getElementById('camFlash'); fl.classList.add('fire'); setTimeout(() => fl.classList.remove('fire'), 150);
        const video = document.getElementById('camVideo'), canvas = document.getElementById('camCanvas');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        if (camFacing === 'user') { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
        ctx.drawImage(video, 0, 0);
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        const detections = await faceapi.detectAllFaces(canvas, new faceapi.TinyFaceDetectorOptions({ scoreThreshold: 0.2, inputSize: 608 })).withFaceLandmarks(true).withFaceDescriptors();
        const labeled = students.filter(s => s.descriptor).map(s => new faceapi.LabeledFaceDescriptors(String(s.id), [new Float32Array(s.descriptor)]));
        if (!labeled.length) { toast('No hay descriptores faciales', 'err'); btn.disabled = false; btn.textContent = 'Tomar Asistencia'; return }
        const matcher = new faceapi.FaceMatcher(labeled, MATCH_THRESHOLD);
        const matched = [], matchedIds = new Set();
        for (const det of detections) { const best = matcher.findBestMatch(det.descriptor); if (best.label !== 'unknown') { const sid = parseInt(best.label); if (!matchedIds.has(sid)) { matchedIds.add(sid); const st = students.find(s => s.id === sid); matched.push({ studentId: sid, name: st ? st.name : 'ID ' + sid, code: st ? st.code : '', confidence: +(1 - best.distance).toFixed(3), box: det.detection.box }) } } }
        drawResults(ctx, detections, matched);
        const results = { date: new Date().toISOString(), present: matched, absent: students.filter(s => !matchedIds.has(s.id)).map(s => ({ studentId: s.id, name: s.name, code: s.code })), totalDetected: detections.length };
        lastResults = results; showResults(results, students.length);
        toast(`Detectados ${detections.length} rostros, ${matched.length} reconocidos`, 'ok');
      } catch (e) { console.error(e); toast('Error: ' + e.message, 'err') }
      btn.disabled = false; btn.textContent = 'Tomar Asistencia';
    }

    function drawResults(ctx, detections, matched) { for (const det of detections) { const box = det.detection.box; const m = matched.find(x => Math.abs(x.box.x - box.x) < 5 && Math.abs(x.box.y - box.y) < 5); const known = !!m, color = known ? '#22c55e' : '#ef4444'; ctx.strokeStyle = color; ctx.lineWidth = 3; ctx.strokeRect(box.x, box.y, box.width, box.height); const label = known ? m.name : 'Desconocido'; ctx.font = 'bold 16px Inter,sans-serif'; const tw = ctx.measureText(label).width; ctx.fillStyle = known ? 'rgba(34,197,94,.8)' : 'rgba(239,68,68,.8)'; ctx.fillRect(box.x, box.y - 26, tw + 12, 24); ctx.fillStyle = '#fff'; ctx.fillText(label, box.x + 6, box.y - 8) } }

    function showResults(r, total) {
      const s = document.getElementById('resultsSection'); s.style.display = 'flex'; s.style.flexDirection = 'column'; s.style.gap = '10px';
      const p = r.present.length, a = r.absent.length, pct = total ? Math.round(p / total * 100) : 0;
      document.getElementById('rPresent').textContent = p; document.getElementById('rAbsent').textContent = a;
      document.getElementById('rTotal').textContent = total; document.getElementById('rProgress').style.width = pct + '%';
      document.getElementById('resultCount').textContent = pct + '% asistencia';
      const list = document.getElementById('resultsList'); list.innerHTML = '';
      r.present.forEach(x => { list.innerHTML += `<div class="result-item result-item--present"><div class="student-item__avatar">${initials(x.name)}</div><div class="student-item__info"><div class="student-item__name">${x.name}</div><div class="student-item__code">${x.code} - ${(x.confidence * 100).toFixed(0)}%</div></div><div class="result-item__badge">Presente</div></div>` });
      r.absent.forEach(x => { list.innerHTML += `<div class="result-item result-item--absent"><div class="student-item__avatar" style="background:linear-gradient(135deg,var(--red),#dc2626)">${initials(x.name)}</div><div class="student-item__info"><div class="student-item__name">${x.name}</div><div class="student-item__code">${x.code}</div></div><div class="result-item__badge">Ausente</div></div>` });
    }
    async function saveCurrentSession() { if (!lastResults) return; await dbAdd('sessions', { date: lastResults.date, present: lastResults.present, absent: lastResults.absent, totalDetected: lastResults.totalDetected }); toast('Sesion guardada', 'ok'); refreshHistory() }

    async function startRegCamera() {
      if (regStream) { regStream.getTracks().forEach(t => t.stop()); regStream = null; }
      try {
        let stream;
        try {
          stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: regFacing }, width: { ideal: 640 }, height: { ideal: 480 } }, audio: false });
        } catch {
          stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: regFacing, width: { ideal: 640 }, height: { ideal: 480 } }, audio: false });
        }
        regStream = stream;
        const v = document.getElementById('regVideo'); v.srcObject = regStream; await v.play();
        v.style.transform = regFacing === 'user' ? 'scaleX(-1)' : 'none';
        document.getElementById('regPlaceholder').style.display = 'none';
        document.getElementById('regVideo').style.display = 'block';
        document.getElementById('regPreview').style.display = 'none';
        document.getElementById('btnRegCapture').style.display = 'inline-flex';
        document.getElementById('btnRegRetake').style.display = 'none';
      } catch (e) { toast('Camara no disponible', 'err'); }
    }
    function stopRegCamera() { if (regStream) { regStream.getTracks().forEach(t => t.stop()); regStream = null } }
    function captureRegPhoto() {
      const fl = document.getElementById('regFlash'); fl.classList.add('fire'); setTimeout(() => fl.classList.remove('fire'), 150);
      const v = document.getElementById('regVideo'), c = document.createElement('canvas');
      c.width = v.videoWidth; c.height = v.videoHeight;
      const ctx = c.getContext('2d');
      if (regFacing === 'user') { ctx.translate(c.width, 0); ctx.scale(-1, 1); }
      ctx.drawImage(v, 0, 0);
      regPhotoData = c.toDataURL('image/jpeg', .92);
      document.getElementById('regPreview').src = regPhotoData;
      document.getElementById('regPreview').style.display = 'block';
      document.getElementById('regVideo').style.display = 'none';
      document.getElementById('btnRegCapture').style.display = 'none';
      document.getElementById('btnRegRetake').style.display = 'inline-flex';
      document.getElementById('btnRegSave').disabled = false; stopRegCamera();
    }
    function retakeRegPhoto() { regPhotoData = null; document.getElementById('btnRegSave').disabled = true; startRegCamera() }

    async function registerStudent() {
      const name = document.getElementById('regName').value.trim(), code = document.getElementById('regCode').value.trim();
      if (!name || !code) return toast('Complete nombre y codigo', 'err');
      if (!regPhotoData) return toast('Capture una foto', 'err');
      const btn = document.getElementById('btnRegSave'); btn.disabled = true; btn.textContent = 'Procesando...';
      try {
        const img = await loadImage(regPhotoData);
        const det = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions({ scoreThreshold: 0.3 })).withFaceLandmarks(true).withFaceDescriptor();
        if (!det) { toast('No se detecto un rostro. Intente de nuevo.', 'err'); btn.disabled = false; btn.textContent = 'Registrar Estudiante'; return }
        await dbAdd('students', { name, code, descriptor: Array.from(det.descriptor), photo: regPhotoData, createdAt: new Date().toISOString() });
        toast(name + ' registrado', 'ok'); document.getElementById('regName').value = ''; document.getElementById('regCode').value = ''; regPhotoData = null; refreshStudentList(); retakeRegPhoto();
      } catch (e) { toast('Error: ' + e.message, 'err') }
      btn.disabled = false; btn.textContent = 'Registrar Estudiante';
    }

    async function refreshStudentList() {
      const students = await dbGetAll('students'), c = document.getElementById('studentList');
      document.getElementById('studentCountLabel').textContent = students.length;
      const badge = document.getElementById('statusBadge'); if (modelsLoaded) { badge.textContent = students.length + ' estudiantes'; badge.classList.add('ready') }
      if (!students.length) { c.innerHTML = '<div class="empty"><div class="empty__icon">👤</div>No hay estudiantes</div>'; return }
      c.innerHTML = students.map(s => `<div class="student-item" id="stu-${s.id}">${s.photo ? `<img class="student-item__photo" src="${s.photo}" alt="">` : `<div class="student-item__avatar">${initials(s.name)}</div>`}<div class="student-item__info"><div class="student-item__name">${s.name}</div><div class="student-item__code">${s.code}</div></div><button class="btn btn--danger btn--icon" onclick="deleteStudent(${s.id})">🗑️</button></div>`).join('');
    }
    async function deleteStudent(id) { if (!confirm('Eliminar?')) return; await dbDelete('students', id); toast('Eliminado', 'info'); refreshStudentList() }

    async function refreshHistory() {
      const sessions = await dbGetAll('sessions'), c = document.getElementById('historyList');
      if (!sessions.length) { c.innerHTML = '<div class="empty"><div class="empty__icon">📋</div>No hay sesiones</div>'; return }
      c.innerHTML = sessions.reverse().map(s => { const d = new Date(s.date), ds = d.toLocaleDateString('es-CO', { day: '2-digit', month: 'short', year: 'numeric' }), ts = d.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' }), t = s.present.length + s.absent.length; return `<div class="session-card"><div class="session-card__info"><div class="session-card__date">${ds} - ${ts}</div><div class="session-card__meta">${s.present.length} presentes, ${s.absent.length} ausentes</div></div><div style="display:flex;align-items:center;gap:8px"><div class="session-card__count">${s.present.length}/${t}</div><button class="btn" onclick="exportSession(${s.id})" style="padding:6px 10px;font-size:.7rem">📥</button><button class="btn btn--danger btn--icon" onclick="deleteSession(${s.id})" style="width:32px;height:32px;font-size:.7rem">🗑️</button></div></div>` }).join('');
    }
    async function deleteSession(id) { if (!confirm('Eliminar?')) return; await dbDelete('sessions', id); refreshHistory(); toast('Eliminada', 'info') }

    function exportResults(r) { if (!r) return toast('No hay resultados', 'err'); const rows = []; r.present.forEach(x => { rows.push({ Nombre: x.name, Codigo: x.code, Estado: 'Presente', Confianza: (x.confidence * 100).toFixed(1) + '%', Fecha: new Date(r.date).toLocaleString('es-CO') }) }); r.absent.forEach(x => { rows.push({ Nombre: x.name, Codigo: x.code, Estado: 'Ausente', Confianza: '-', Fecha: new Date(r.date).toLocaleString('es-CO') }) }); downloadExcel(rows, 'asistencia') }
    async function exportSession(id) { const ss = await dbGetAll('sessions'); const s = ss.find(x => x.id === id); if (s) exportResults(s) }
    async function exportAllSessions() { const ss = await dbGetAll('sessions'); if (!ss.length) return toast('No hay sesiones', 'err'); const rows = []; ss.forEach(s => { const d = new Date(s.date).toLocaleString('es-CO'); s.present.forEach(r => { rows.push({ Fecha: d, Nombre: r.name, Codigo: r.code, Estado: 'Presente', Confianza: (r.confidence * 100).toFixed(1) + '%' }) }); s.absent.forEach(r => { rows.push({ Fecha: d, Nombre: r.name, Codigo: r.code, Estado: 'Ausente', Confianza: '-' }) }) }); downloadExcel(rows, 'historial') }
    function downloadExcel(rows, name) { const ws = XLSX.utils.json_to_sheet(rows); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Asistencia'); ws['!cols'] = [{ wch: 28 }, { wch: 12 }, { wch: 12 }, { wch: 10 }, { wch: 22 }]; XLSX.writeFile(wb, name + '_' + new Date().toISOString().slice(0, 10) + '.xlsx'); toast('Excel descargado', 'ok') }

    function initials(n) { return n.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase() }
    function loadImage(src) { return new Promise((res, rej) => { const i = new Image(); i.onload = () => res(i); i.onerror = rej; i.src = src }) }
    function toast(msg, type = 'info') { const box = document.getElementById('toastBox'), icons = { ok: '✅', err: '❌', info: 'ℹ️' }, el = document.createElement('div'); el.className = 'toast toast--' + type; el.innerHTML = `<span>${icons[type] || 'ℹ️'}</span><span>${msg}</span>`; box.appendChild(el); setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300) }, 3500) }
    function updateLoader(t) { document.getElementById('loaderText').textContent = t }
    function hideLoader() { document.getElementById('loader').classList.add('hidden') }
  </script>
</body>

</html>
